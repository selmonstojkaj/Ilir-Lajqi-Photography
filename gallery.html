<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="galeria.css">
    <title>Galeria - Ilir Lajqi Photography</title>
</head>
<body>
    <div class="container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <h1 class="logo">Ilir Lajqi Photography</h1>
            <nav>
                <a href="home.html">Ballina</a>
                <a href="gallery.html" class="active">Galeria</a>
                <a href="about.html">Reth Nesh</a>
                <a href="pricing.html">Çmimi</a>
                <a href="contact.html">Kontakti</a>
            </nav>
        </aside>

        <main class="gallery-main">
            <!-- Page Header -->
            <header class="gallery-header">
                <h1 class="gallery-title">Galeria</h1>
                <p class="gallery-subtitle">Momentet e kapura me pasion dhe profesionizëm</p>
            </header>

            <!-- Portraits Section -->
            <section class="gallery-section">
                <h2 class="section-label">Portrete</h2>
                <div class="gallery-grid">
                    <figure class="gallery-item" data-category="portrait" data-index="0">
                        <img src="albert-dera-ILip77SbmOE-unsplash.jpg" alt="Portrait 1" loading="lazy">
                        <div class="overlay">
                            <span class="view-text">Shiko</span>
                            <span class="view-icon" aria-hidden="true">+</span>
                        </div>
                    </figure>
                    <figure class="gallery-item" data-category="portrait" data-index="1">
                        <img src="stefan-stefancik-QXevDflbl8A-unsplash.jpg" alt="Portrait 2" loading="lazy">
                        <div class="overlay">
                            <span class="view-text">Shiko</span>
                            <span class="view-icon" aria-hidden="true">+</span>
                        </div>
                    </figure>
                    <figure class="gallery-item" data-category="portrait" data-index="2">
                        <img src="https://picsum.photos/seed/p2/1600/1000" alt="Portrait 3" loading="lazy">
                        <div class="overlay">
                            <span class="view-text">Shiko</span>
                            <span class="view-icon" aria-hidden="true">+</span>
                        </div>
                    </figure>
                </div>
            </section>

            <!-- Weddings Section -->
            <section class="gallery-section">
                <h2 class="section-label">Dasma</h2>
                <div class="gallery-grid">
                    <figure class="gallery-item" data-category="wedding" data-index="3">
                        <img src="katelyn-macmillan-MtwNya-3mac-unsplash.jpg" alt="Wedding 1" loading="lazy">
                        <div class="overlay">
                            <span class="view-text">Shiko</span>
                            <span class="view-icon" aria-hidden="true">+</span>
                        </div>
                    </figure>
                    <figure class="gallery-item" data-category="wedding" data-index="4">
                        <img src="wedding.jpg" alt="Wedding 2" loading="lazy">
                        <div class="overlay">
                            <span class="view-text">Shiko</span>
                            <span class="view-icon" aria-hidden="true">+</span>
                        </div>
                    </figure>
                    <figure class="gallery-item" data-category="wedding" data-index="5">
                        <img src="vadim-paripa-PuXtB1B4zL8-unsplash.jpg" alt="Wedding 3" loading="lazy">
                        <div class="overlay">
                            <span class="view-text">Shiko</span>
                            <span class="view-icon" aria-hidden="true">+</span>
                        </div>
                    </figure>
                </div>
            </section>

            <!-- Events Section -->
            <section class="gallery-section">
                <h2 class="section-label">Evente</h2>
                <div class="gallery-grid">
                    <figure class="gallery-item" data-category="event" data-index="6">
                        <img src="new-year-through-the-ages.jpg" alt="Event 1" loading="lazy">
                        <div class="overlay">
                            <span class="view-text">Shiko</span>
                            <span class="view-icon" aria-hidden="true">+</span>
                        </div>
                    </figure>
                    <figure class="gallery-item" data-category="event" data-index="7">
                        <img src="https://picsum.photos/seed/p7/1600/1000" alt="Event 2" loading="lazy">
                        <div class="overlay">
                            <span class="view-text">Shiko</span>
                            <span class="view-icon" aria-hidden="true">+</span>
                        </div>
                    </figure>
                    <figure class="gallery-item" data-category="event" data-index="8">
                        <img src="1eec451c96178d7a2fee804c42974554.jpg" alt="Event 3" loading="lazy">
                        <div class="overlay">
                            <span class="view-text">Shiko</span>
                            <span class="view-icon" aria-hidden="true">+</span>
                        </div>
                    </figure>
                </div>
            </section>

            <!-- Lifestyle Section -->
            <section class="gallery-section">
                <h2 class="section-label">Peisazhet</h2>
                <div class="gallery-grid">
                    <figure class="gallery-item" data-category="lifestyle" data-index="9">
                        <img src="https://picsum.photos/seed/p9/1600/1000" alt="Lifestyle 1" loading="lazy">
                        <div class="overlay">
                            <span class="view-text">Shiko</span>
                            <span class="view-icon" aria-hidden="true">+</span>
                        </div>
                    </figure>
                    <figure class="gallery-item" data-category="lifestyle" data-index="10">
                        <img src="https://picsum.photos/seed/p10/1600/1000" alt="Lifestyle 2" loading="lazy">
                        <div class="overlay">
                            <span class="view-text">Shiko</span>
                            <span class="view-icon" aria-hidden="true">+</span>
                        </div>
                    </figure>
                    <figure class="gallery-item" data-category="lifestyle" data-index="11">
                        <img src="https://picsum.photos/seed/p11/1600/1000" alt="Lifestyle 3" loading="lazy">
                        <div class="overlay">
                            <span class="view-text">Shiko</span>
                            <span class="view-icon" aria-hidden="true">+</span>
                        </div>
                    </figure>
                </div>
            </section>
        </main>

        <!-- Lightbox -->
        <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
            <button class="lightbox-close" aria-label="Close">&times;</button>
            <button class="lightbox-prev" aria-label="Previous image">&#10094;</button>
            <button class="lightbox-next" aria-label="Next image">&#10095;</button>
            <div class="lightbox-content">
                <img src="" alt="">
            </div>
        </div>
    </div>

    <script src="gallery.js"></script>
</body>
</html>
